<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  display: flex; justify-content: center; align-items: center;
  min-height: 100vh;
  background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
  font-family: -apple-system, 'Microsoft YaHei', sans-serif;
}
.card {
  background: #fff;
  border-radius: 20px;
  padding: 40px 36px 32px;
  text-align: center;
  box-shadow: 0 20px 60px rgba(0,0,0,0.3);
  max-width: 340px;
  width: 92%;
}
.logo {
  width: 60px; height: 60px;
  background: linear-gradient(135deg, #4F46E5, #7C3AED);
  border-radius: 18px;
  display: inline-flex; align-items: center; justify-content: center;
  color: #fff; font-size: 28px; font-weight: 800;
  margin-bottom: 14px;
}
h1 { font-size: 22px; color: #1e1b4b; margin-bottom: 4px; font-weight: 700; }
.brand { font-size: 13px; color: #7C3AED; font-weight: 600; margin-bottom: 22px; }
.qr-box {
  background: #fff;
  border: 3px solid #4F46E5;
  border-radius: 16px;
  padding: 10px;
  display: inline-block;
  margin-bottom: 18px;
}
.qr-box img { width: 200px; height: 200px; display: block; border-radius: 4px; }
.cta { font-size: 15px; color: #1e1b4b; font-weight: 700; margin-bottom: 4px; }
.cta-sub { font-size: 12px; color: #94A3B8; margin-bottom: 20px; }
.features { display: flex; gap: 8px; justify-content: center; margin-bottom: 20px; flex-wrap: wrap; }
.feature {
  font-size: 11px; padding: 4px 10px;
  border-radius: 20px; font-weight: 500;
}
.f1 { background: #EEF2FF; color: #4F46E5; }
.f2 { background: #FFF7ED; color: #EA580C; }
.f3 { background: #ECFDF5; color: #059669; }
.footer { font-size: 11px; color: #cbd5e1; border-top: 1px solid #f1f5f9; padding-top: 14px; }
.footer strong { color: #64748B; }
</style>
